<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Series</title>

    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/app.js"></script>
    <script defer src="js/debug.js"></script>

    <style>
        .series-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
        }

        .series-header img {
            width: 140px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border-dark);
        }

        .series-info h2 {
            margin: 0;
            font-size: 24px;
        }

        .delete-btn {
            margin-top: 10px;
            background: #b91c1c;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
        }

        .chapter-list {
            margin-top: 20px;
        }

        .chapter-item {
            padding: 12px;
            background: #0f141a;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .chapter-item:hover {
            box-shadow: 0 0 10px var(--glow-blue);
            transform: translateX(4px);
        }

        .progress-badge {
            display: inline-block;
            padding: 4px 8px;
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            color: #000;
            border-radius: 6px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>

<body class="content">

    <button onclick="window.location.href='index.html'" class="btn-gradient" style="margin-bottom:20px;">
        ← Back to Library
    </button>

    <div id="seriesContainer"></div>

    <script>
        const series = app.getCurrentSeries();

        if (!series) {
            document.getElementById("seriesContainer").innerHTML =
                "<p>Series not found.</p>";
        } else {
            renderSeries();
        }

        function renderSeries() {
            const container = document.getElementById("seriesContainer");

            container.innerHTML = `
                <div class="series-header">
                    <img src="${series.cover}" />
                    <div class="series-info">
                        <h2>${series.title}</h2>
                        <div>Status: <span class="progress-badge">${series.status}</span></div>
                        <button class="delete-btn" onclick="deleteThisSeries()">Delete Series</button>
                    </div>
                </div>

                <h3>Chapters</h3>
                <div class="chapter-list" id="chapterList"></div>
            `;

            const list = document.getElementById("chapterList");

            for (let i = series.startChapter; i <= series.totalChapters; i++) {
                const item = document.createElement("div");
                item.className = "chapter-item";
                item.textContent = "Chapter " + i;

                item.onclick = () => openChapter(i);

                list.appendChild(item);
            }
        }

        function deleteThisSeries() {
            if (confirm("Delete this series?")) {
                app.deleteSeries(series.id);
                window.location.href = "index.html";
            }
        }

        function openChapter(chNum) {
            localStorage.setItem("currentChapter", chNum);
            window.location.href = "reader.html";
        }
    </script>

</body>
</html>
