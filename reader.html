<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapters</title>

    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/app.js"></script>
    <script defer src="js/debug.js"></script>

    <style>
        .chapter-header {
            margin-bottom: 20px;
        }

        .chapter-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .chapter-list {
            margin-top: 20px;
        }

        .chapter-item {
            padding: 12px;
            background: #0f141a;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .chapter-item:hover {
            box-shadow: 0 0 10px var(--glow-blue);
            transform: translateX(4px);
        }
    </style>
</head>

<body class="content">

    <button onclick="window.location.href='series.html'" class="btn-gradient" style="margin-bottom:20px;">
        ← Back to Series
    </button>

    <div id="chapterContainer"></div>

    <script>
        const series = app.getCurrentSeries();

        if (!series) {
            document.getElementById("chapterContainer").innerHTML =
                "<p>Series not found.</p>";
        } else {
            renderChapters();
        }

        function renderChapters() {
            const container = document.getElementById("chapterContainer");

            container.innerHTML = `
                <div class="chapter-header">
                    <h2>${series.title}</h2>
                    <p>Total Chapters: ${series.totalChapters}</p>
                </div>

                <div class="chapter-list" id="chapterList"></div>
            `;

            const list = document.getElementById("chapterList");

            for (let i = series.startChapter; i <= series.totalChapters; i++) {
                const item = document.createElement("div");
                item.className = "chapter-item";
                item.textContent = "Chapter " + i;

                item.onclick = () => openChapter(i);

                list.appendChild(item);
            }
        }

        function openChapter(chNum) {
            localStorage.setItem("currentChapter", chNum);
            window.location.href = "reader.html";
        }
    </script>

</body>
</html>
