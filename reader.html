<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reader • Manhwa App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body class="reader-body">

<div class="reader-topbar">
  <button id="backBtn" class="btn-secondary">← Chapters</button>
  <div id="readerTitle" class="reader-title"></div>
</div>

<div id="readerContainer" class="reader-container">
  <div id="loadingMsg" class="reader-loading">Loading…</div>
  <div id="readerImages"></div>
</div>

<div id="leftZone" class="tap-zone left"></div>
<div id="rightZone" class="tap-zone right"></div>

<script src="js/app.js"></script>
<script src="js/fetchMeta.js"></script>
<script src="js/pwa.js"></script>
<script src="js/debug.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const ch = parseInt(params.get("ch"));

const series = getSeriesById(id);
if (!series) {
  alert("Series not found");
  window.location.href = "index.html";
}

document.getElementById("readerTitle").textContent =
  `${series.title} — Chapter ${ch}`;

document.getElementById("backBtn").onclick = () =>
  window.location.href = `chapters.html?id=${series.id}`;

const chapterURL = series.baseChapterURL + ch;

async function loadWebtoonXYZ(url) {
  const proxy = "https://api.allorigins.win/raw?url=";
  const res = await fetch(proxy + encodeURIComponent(url));
  const html = await res.text();

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");
  const imgs = [...doc.querySelectorAll(".reading-content img")];

  return imgs.map(img => img.src);
}

async function loadChapter() {
  debugLog({
    event: "READER_LOAD",
    chapterURL,
    baseChapterURL: series.baseChapterURL,
    chapter: ch
  });

  try {
    const images = await loadWebtoonXYZ(chapterURL);

    debugLog({
      event: "READER_IMAGES",
      count: images.length,
      images
    });

    const loadingMsg = document.getElementById("loadingMsg");
    const container = document.getElementById("readerImages");

    if (!images.length) {
      loadingMsg.textContent = "No images found.";
      return;
    }

    loadingMsg.style.display = "none";

    images.forEach(src => {
      const img = document.createElement("img");
      img.className = "reader-img";
      img.src = src;
      container.appendChild(img);
    });

    series.currentChapter = ch;
    saveLibrary();

    preloadNextChapter();

  } catch (err) {
    debugLog({ event: "READER_ERROR", error: String(err) });
    document.getElementById("loadingMsg").textContent =
      "Failed to load chapter.";
  }
}

async function preloadNextChapter() {
  if (!series.totalChapters || ch >= series.totalChapters) return;
  const nextURL = series.baseChapterURL + (ch + 1);
  const proxy = "https://api.allorigins.win/raw?url=";
  fetch(proxy + encodeURIComponent(nextURL)).catch(() => {});
}

loadChapter();

document.getElementById("leftZone").onclick = () => {
  if (ch > 1) {
    window.location.href = `reader.html?id=${series.id}&ch=${ch - 1}`;
  }
};

document.getElementById("rightZone").onclick = () => {
  if (series.totalChapters && ch < series.totalChapters) {
    window.location.href = `reader.html?id=${series.id}&ch=${ch + 1}`;
  }
};
</script>

</body>
</html>
