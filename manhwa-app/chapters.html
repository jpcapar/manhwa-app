<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chapters • Manhwa App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="sidebar-title">Manhwa</div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">Library</a>
    </nav>
  </aside>

  <main class="main">
    <div class="chapter-header">
      <button id="backBtn" class="btn-secondary">← Series</button>
      <div id="chapterSeriesTitle" class="chapter-title"></div>
    </div>

    <div id="chapterList" class="chapter-list"></div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/fetchMeta.js"></script>
<script src="js/ui.js"></script>
<script src="js/autoDetect.js"></script>
<script src="js/pwa.js"></script>
<script src="js/debug.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const series = getSeriesById(id);

if (!series) {
  alert("Series not found");
  window.location.href = "index.html";
}

document.getElementById("chapterSeriesTitle").textContent = series.title;
document.getElementById("backBtn").onclick = () => {
  window.location.href = `series.html?id=${series.id}`;
};

function renderChapterList() {
  const list = document.getElementById("chapterList");
  list.innerHTML = "";

  const total = series.totalChapters || 0;
  for (let ch = total; ch >= 1; ch--) {
    const item = document.createElement("div");
    item.className = "chapter-item";

    if (series.currentChapter === ch) item.classList.add("chapter-current");
    if (series.currentChapter && ch < series.currentChapter) item.classList.add("chapter-read");

    const left = document.createElement("div");
    left.textContent = `Chapter ${ch}`;

    const right = document.createElement("div");
    const tag = document.createElement("span");
    tag.className = "chapter-tag";

    if (series.currentChapter === ch) {
      tag.classList.add("current");
      tag.textContent = "Current";
    } else if (series.currentChapter && ch < series.currentChapter) {
      tag.classList.add("read");
      tag.textContent = "Read";
    } else {
      tag.classList.add("unread");
      tag.textContent = "Unread";
    }

    right.appendChild(tag);
    item.appendChild(left);
    item.appendChild(right);

    item.onclick = () => {
      window.location.href = `reader.html?id=${series.id}&ch=${ch}`;
    };

    list.appendChild(item);
  }
}

renderChapterList();
</script>

</body>
</html>
