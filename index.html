<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manhwa App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="sidebar-title">Manhwa</div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item active">Library</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <input id="searchInput" class="search-input" placeholder="Search…">
      <select id="sortSelect" class="sort-select">
        <option value="updated">Recently updated</option>
        <option value="az">A–Z</option>
        <option value="progress">By progress</option>
      </select>
    </div>

    <div id="dropzone" class="dropzone">
      Drag & drop a manhwa link here
    </div>

    <div id="libraryGrid" class="grid"></div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/fetchMeta.js"></script>
<script src="js/ui.js"></script>
<script src="js/autoDetect.js"></script>
<script src="js/pwa.js"></script>
<script src="js/debug.js"></script>
</body>
</html>
